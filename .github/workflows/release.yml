name: Create GitHub release

on:
  workflow_dispatch:
    inputs:
      release:
        type: choice
        description: 'Should this build be released?'
        options:
        - true
        - false
        default: 'false'
      ref_to_build:
        description: 'Ref to build (only tested by providing tags), e.g. v6.1.0'
        required: true

env:
  SIGNAL_TAG: ${{ inputs.ref_to_build }}

permissions: {}

jobs:
  linux:
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 20
    permissions:
      # actions/checkout of this public repo uses GITHUB_TOKEN; the rest
      # of the privileged work uses the GH App token explicitly.
      contents: read
      # Build provenance attestation: OIDC token, write to the attestation
      # store, write to the artifact-metadata store.
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      # Checkout repos
      - name: Get GH token
        id: generate_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.GH_APP_DENNIS_APP_ID }}
          private-key: ${{ secrets.GH_APP_DENNIS_PRIVATE_KEY }}
          owner: dennisameling
          repositories: Signal-Desktop
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: 'signalapp/signal-desktop'
          ref: ${{ inputs.ref_to_build }}
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 200
          persist-credentials: false
      # Push with the token inline so we don't leave credentials in
      # .git/config for later (untrusted) steps to read.
      - name: Create ${{ inputs.ref_to_build }} tag in dennisameling/Signal-Desktop
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          git push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/dennisameling/Signal-Desktop.git" \
            "HEAD:refs/tags/${SIGNAL_TAG}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: ./tmp-automation-release-scripts
          persist-credentials: false

      # Install NodeJS and prepare dependencies
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: sudo apt-get update && sudo apt-get install xvfb libpulse0
      - run: npm install -g npm@10.2.5
      - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1.307.0
        with:
          ruby-version: '3.3'
      - name: Install FPM (for packaging)
        run: gem install fpm
      # Write keys via env vars and printf — `echo ${{ secrets.X }}` would
      # interpolate the secret into the shell command (injection risk) and
      # `echo`'s word-splitting would mangle multi-line PEMs.
      - name: Prepare release signing
        env:
          PUB:  ${{ secrets.SIGN_RELEASE_PUBLIC_KEY }}
          PRIV: ${{ secrets.SIGN_RELEASE_PRIVATE_KEY }}
        run: |
          printf '%s' "$PUB"  > public.key
          printf '%s' "$PRIV" > private.key
          chmod 600 private.key

      # Copy files to the patches/ directory where all of Signal's per-dependency patches live
      # NOTE: after creating a patch, make sure to add it to patch-files.mjs too!
      - run: cp -v ./tmp-automation-release-scripts/patches/* patches/

      - name: Patch package.json and pnpm-workspace.yaml
        run: SIGNAL_DIR="${{ github.workspace }}" node ./tmp-automation-release-scripts/patch-files.mjs

      # Build Sticker Creator
      - working-directory: ./sticker-creator
        run: |
          pnpm install
          pnpm run build
      
      # The steps below pretty much exactly mimic the official build
      # https://github.com/signalapp/Signal-Desktop/blob/main/.github/workflows/ci.yml
      # We use --no-frozen-lockfile here because patch-files.mjs adds an
      # entry to patchedDependencies (in pnpm-workspace.yaml), which causes
      # pnpm to regenerate the lockfile.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run generate
      # `pnpm run generate` must not touch tracked files. The exclusions
      # below are the files we deliberately rewrite earlier in this job.
      - name: Verify generate produced no unexpected changes
        run: |
          git diff --exit-code -- \
            ':!package.json' \
            ':!pnpm-workspace.yaml' \
            ':!pnpm-lock.yaml'
      - run: pnpm run prepare-beta-build
      - name: Create bundle
        run: pnpm run build:esbuild:prod
      # Doesn't seem to work and no logs, so skipping it
      #- name: Create preload cache
      #  run: xvfb-run --auto-servernum pnpm run build:preload-cache
      #  env:
      #    ARTIFACTS_DIR: artifacts/linux
      - name: Build with packaging .deb file
        run: pnpm run build:release --publish=never
        env:
          USE_SYSTEM_FPM: 'true'
          DISABLE_INSPECT_FUSE: 'on'
      # SLSA build provenance attestation. The release job re-verifies this
      # against the downloaded artifact so anything that tampered with the
      # binary between upload and publish trips a digest mismatch.
      - name: Attest build provenance for release binaries
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: 'release/signal-desktop-unofficial*'
      - run: xvfb-run --auto-servernum pnpm run test-node
        env:
          ELECTRON_DISABLE_SANDBOX: true
      # Pull the same Signal-Message-Backup-Tests SHA upstream's CI uses for
      # this Signal version, so our test-electron gates match theirs.
      - name: Resolve backup-integration-tests SHA from Signal's CI
        id: backup-sha
        run: |
          SHA=$(grep -A2 'Signal-Message-Backup-Tests' .github/workflows/ci.yml | grep -oE '[a-f0-9]{40}' | head -1)
          if [ -z "$SHA" ]; then
            echo "Could not find Signal-Message-Backup-Tests ref in upstream CI" >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Using Signal-Message-Backup-Tests @ $SHA"
      - name: Clone backup integration tests
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: 'signalapp/Signal-Message-Backup-Tests'
          ref: ${{ steps.backup-sha.outputs.sha }}
          path: 'backup-integration-tests'
          persist-credentials: false
      - run: xvfb-run --auto-servernum pnpm run test-electron
        env:
          ELECTRON_DISABLE_SANDBOX: true
          BACKUP_INTEGRATION_DIR: 'backup-integration-tests/test-cases'
      - run: xvfb-run --auto-servernum pnpm run test-release
        env:
          NODE_ENV: production
          ELECTRON_DISABLE_SANDBOX: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-binaries
          path: release/signal-desktop-unofficial*

  # Smoke-build inside a Raspberry Pi OS userland to catch breakage in the
  # arm64 Pi-specific fs-extra patch. Runs on the same ubuntu-22.04-arm host
  # kernel, so it does not reproduce hardware-specific Pi bugs — it verifies
  # the patch applies and the build pipeline completes against Pi OS libs.
  test-raspberrypi:
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
    container:
      # Pinned to a multi-arch index digest so a malicious tag re-push can't
      # swap in a different image. The GH App token flows through this
      # container during checkout, so a swap would be a credential leak.
      # Bump alongside the workflow when picking up new base-OS patches.
      image: ghcr.io/dtcooper/raspberrypi-os:bookworm@sha256:19c44df0fedce744262225033ccc1c4e7b1d325495db97335ed863834415b48e

    steps:
      - name: Install OS dependencies
        run: |
          apt-get update
          apt-get install -y \
            git curl ca-certificates \
            build-essential python3 \
            ruby ruby-dev \
            xvfb libpulse0 \
            libnss3 libgbm1 libasound2 libsecret-1-0 \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgtk-3-0 libpango-1.0-0 libpangocairo-1.0-0 libcairo2 \
            libgdk-pixbuf-2.0-0 libdrm2 libxshmfence1 libxkbcommon0 libxss1 \
            fuse libfuse2
          gem install fpm

      - name: Get GH token
        id: generate_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.GH_APP_DENNIS_APP_ID }}
          private-key: ${{ secrets.GH_APP_DENNIS_PRIVATE_KEY }}
          owner: dennisameling
          repositories: Signal-Desktop
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: 'signalapp/signal-desktop'
          ref: ${{ inputs.ref_to_build }}
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 200
          persist-credentials: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: ./tmp-automation-release-scripts
          persist-credentials: false

      # The workspace is owned by a different uid than the user our shell
      # runs as inside the container, so git refuses to operate on it.
      # actions/checkout handles this for itself under a temp HOME, but the
      # trust does not persist to later steps (e.g. scripts/get-expire-time).
      - name: Trust workspace dirs in git
        run: git config --global --add safe.directory '*'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - run: npm install -g npm@10.2.5

      - name: Prepare release signing
        env:
          PUB:  ${{ secrets.SIGN_RELEASE_PUBLIC_KEY }}
          PRIV: ${{ secrets.SIGN_RELEASE_PRIVATE_KEY }}
        run: |
          printf '%s' "$PUB"  > public.key
          printf '%s' "$PRIV" > private.key
          chmod 600 private.key

      - run: cp -v ./tmp-automation-release-scripts/patches/* patches/

      # github.workspace expands to the host path, which doesn't exist inside
      # the container — use $GITHUB_WORKSPACE, which Actions sets to the
      # in-container mount path.
      - name: Patch package.json and pnpm-workspace.yaml
        run: SIGNAL_DIR="$GITHUB_WORKSPACE" node ./tmp-automation-release-scripts/patch-files.mjs

      - working-directory: ./sticker-creator
        run: |
          pnpm install
          pnpm run build

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run generate
      # `pnpm run generate` must not touch tracked files. The exclusions
      # below are the files we deliberately rewrite earlier in this job.
      - name: Verify generate produced no unexpected changes
        run: |
          git diff --exit-code -- \
            ':!package.json' \
            ':!pnpm-workspace.yaml' \
            ':!pnpm-lock.yaml'
      - run: pnpm run prepare-beta-build
      - name: Create bundle
        run: pnpm run build:esbuild:prod
      - name: Build with packaging .deb file
        run: pnpm run build:release --publish=never
        env:
          USE_SYSTEM_FPM: 'true'
          DISABLE_INSPECT_FUSE: 'on'

      # Pull the same Signal-Message-Backup-Tests SHA upstream's CI uses for
      # this Signal version. Cloned before the chown below so test-electron
      # can read it as testuser.
      - name: Resolve backup-integration-tests SHA from Signal's CI
        id: backup-sha
        run: |
          SHA=$(grep -A2 'Signal-Message-Backup-Tests' .github/workflows/ci.yml | grep -oE '[a-f0-9]{40}' | head -1)
          if [ -z "$SHA" ]; then
            echo "Could not find Signal-Message-Backup-Tests ref in upstream CI" >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Using Signal-Message-Backup-Tests @ $SHA"
      - name: Clone backup integration tests
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: 'signalapp/Signal-Message-Backup-Tests'
          ref: ${{ steps.backup-sha.outputs.sha }}
          path: 'backup-integration-tests'
          persist-credentials: false

      # Filesystem-permission tests assume non-root semantics (root bypasses
      # the permission bits they rely on). Build as root so apt-get / system
      # work, then drop to a non-root user for the test suite to match how
      # the linux runner exercises it.
      - name: Create non-root test user and hand over the workspace
        run: |
          useradd -m -u 2000 testuser
          chown -R testuser:testuser "$GITHUB_WORKSPACE" /home/testuser

      - run: runuser -u testuser -- xvfb-run --auto-servernum pnpm run test-node
        env:
          ELECTRON_DISABLE_SANDBOX: true
      - run: runuser -u testuser -- xvfb-run --auto-servernum pnpm run test-electron
        env:
          ELECTRON_DISABLE_SANDBOX: true
          BACKUP_INTEGRATION_DIR: 'backup-integration-tests/test-cases'
      - run: runuser -u testuser -- xvfb-run --auto-servernum pnpm run test-release
        env:
          NODE_ENV: production
          ELECTRON_DISABLE_SANDBOX: true

  release:
    needs: [linux, test-raspberrypi]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: inputs.release == 'true'
    permissions:
      # The release itself is created with the GH App token. `contents: read`
      # is enough for download-artifact; `attestations: read` lets
      # `gh attestation verify` look up the SLSA attestation produced by the
      # linux job.
      contents: read
      attestations: read

    outputs:
      release_url: ${{ steps.create-release.outputs.html_url }}
      signal_version: ${{ steps.signal-version.outputs.version }}

    steps:
    - name: Get GH token
      id: generate_token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      with:
        app-id: ${{ secrets.GH_APP_DENNIS_APP_ID }}
        private-key: ${{ secrets.GH_APP_DENNIS_PRIVATE_KEY }}
        owner: dennisameling
        repositories: Signal-Desktop
    # Turns v6.1.0 into 6.1.0
    - name: Get version from tag
      id: signal-version
      run: |
        SIGNAL_VERSION=${SIGNAL_TAG#"v"}
        echo "SIGNAL_VERSION=${SIGNAL_VERSION}" >> $GITHUB_ENV
        echo "SIGNAL_TAG=${SIGNAL_TAG}" >> $GITHUB_ENV
        echo "version=${SIGNAL_VERSION}" >> $GITHUB_OUTPUT
    - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: release-binaries
        path: binaries
    # Verify each downloaded binary against the SLSA attestation generated
    # in the linux job. Mismatch = the artifact was tampered with between
    # upload and download, and we refuse to publish.
    - name: Verify build provenance
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        shopt -s nullglob
        files=(binaries/*)
        if [ ${#files[@]} -eq 0 ]; then
          echo "No artifacts to verify" >&2
          exit 1
        fi
        for f in "${files[@]}"; do
          echo "Verifying $f"
          gh attestation verify "$f" --repo "${{ github.repository }}"
        done
    - name: Create GitHub release
      id: create-release
      env:
        GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        SIGNAL_VERSION: ${{ steps.signal-version.outputs.version }}
      run: |
        cat > release-notes.md <<'EOF'
        This is the v__SIGNAL_VERSION__ release.

        ## Linux arm64

        This release contains a `.deb` file for Linux users. Note that auto-updates are **not** supported on this platform.

        ## Windows arm64

        > [!WARNING]
        > Official support for Windows arm64 [was added in Signal 7.34.0](https://github.com/signalapp/Signal-Desktop/issues/3745#issuecomment-2489355026), meaning that I will no longer be offering builds for Signal Unofficial. The last release with Windows arm64 support here is 7.35.0. **You can migrate to the official client while keeping all your chat history and data**. Instructions are [here](https://github.com/dennisameling/Signal-Desktop/issues/24#issuecomment-2490816224).
        EOF
        sed -i "s/__SIGNAL_VERSION__/${SIGNAL_VERSION}/g" release-notes.md
        URL=$(gh release create "${SIGNAL_TAG}" \
          binaries/* \
          --repo dennisameling/Signal-Desktop \
          --title "v${SIGNAL_VERSION}" \
          --notes-file release-notes.md \
          --latest)
        echo "html_url=${URL}" >> "$GITHUB_OUTPUT"
